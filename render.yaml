version: 1
services:
  # Backend Web Service
  - type: web
    name: mcms-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SYNC
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: mcms-frontend
          type: static
          property: url

  # Frontend Static Site
  - type: static
    name: mcms-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mcms-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
