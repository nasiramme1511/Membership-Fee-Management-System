version: 1
services:
  # Backend Web Service
  - type: web
    name: mcms-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false # Must be provided in Render UI
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: 3306 # Default for most, but Aiven uses 23074 (User will override in UI)
      - key: DB_SSL
        value: "true"
      - key: DB_SYNC
        value: "true" # Set to true for first deployment to create tables
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: mcms-frontend
          type: static_site
          property: url

  # Frontend Static Site
  - type: static_site
    name: mcms-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mcms-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
